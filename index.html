<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>dcord | Sam Edition</title>
    <style>
        :root {
            --bg-dark: #313338; --bg-side: #2b2d31; --bg-servers: #1e1f22;
            --text-main: #dbdee1; --accent: #5865f2; --nitro-pink: #ff73fa;
        }
        body, html { margin: 0; padding: 0; font-family: sans-serif; height: 100%; background: var(--bg-dark); color: var(--text-main); overflow: hidden; }
        .app { display: flex; height: 100vh; }
        
        /* Server Icons */
        .servers { width: 72px; background: var(--bg-servers); display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 8px; }
        .server-btn { width: 48px; height: 48px; background: var(--bg-dark); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; background-size: cover; background-position: center; font-weight: bold; }
        .server-btn:hover, .server-btn.active { border-radius: 30%; background-color: var(--accent); }
        .boosted { border: 2px solid var(--nitro-pink); box-shadow: 0 0 10px var(--nitro-pink); }

        .channels { width: 240px; background: var(--bg-side); display: flex; flex-direction: column; }
        .header { height: 48px; padding: 0 16px; display: flex; align-items: center; font-weight: bold; border-bottom: 1px solid rgba(0,0,0,0.1); justify-content: space-between; }
        .link { padding: 8px 12px; margin: 2px 8px; border-radius: 4px; cursor: pointer; color: #949ba4; }
        .link.active { background: #35373c; color: white; }

        .main { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { display: flex; gap: 12px; }
        .avatar { width: 40px; height: 40px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .nitro-glow { border: 2px solid var(--nitro-pink); box-shadow: 0 0 8px var(--nitro-pink); }
        
        .input-box { padding: 20px; }
        input { width: 100%; background: #383a40; border: none; color: white; padding: 12px; border-radius: 8px; outline: none; }
        .btn-join { background: #23a55a; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div class="app">
    <div class="servers" id="s-bar"></div>
    <div class="channels">
        <div class="header"><span id="s-name">Dcord</span></div>
        <div id="c-list"></div>
        <div style="margin-top:auto; padding:15px; background:#232428;">
            <div id="u-name" style="font-weight:bold;">User</div>
            <div id="u-nitro" style="color:var(--nitro-pink); font-size:10px; cursor:pointer;" onclick="boost()">💎 Boost Server</div>
        </div>
    </div>
    <div class="main">
        <div class="header">
            <span id="r-title"># global</span>
            <button class="btn-join" onclick="copyInvite()">Invite to Server</button>
        </div>
        <div class="messages" id="flow"></div>
        <div class="input-box"><input type="text" id="chat-in" placeholder="Message..." onkeypress="handle(event)"></div>
    </div>
</div>

<script>
    let myName = localStorage.getItem('dc-user') || prompt("Username:");
    localStorage.setItem('dc-user', myName);
    let isSam = myName.toLowerCase() === 'sam';
    let currentRoom = "global";
    let servers = [];

    // --- INVITE CHECK ---
    const params = new URLSearchParams(window.location.search);
    const joinId = params.get('join');

    async function sync() {
        const res = await fetch('/api/chat');
        const data = await res.json();
        servers = data.servers || [];
        
        // If they have an invite link, make sure they switch to that room
        if (joinId && currentRoom === "global") {
            currentRoom = joinId;
            window.history.replaceState({}, document.title, "/"); // Clean the URL
        }
        
        render(data.messages);
    }

    async function createSrv() {
        const name = prompt("Server Name:");
        const icon = prompt("Icon Image URL (leave blank for text):");
        if (!name) return;
        const id = name.toLowerCase().replace(/\s/g, '-');
        await fetch('/api/chat', {
            method: 'POST',
            body: JSON.stringify({ action: "CREATE_SERVER", serverId: id, serverName: name, icon, user: myName, isAdmin: isSam })
        });
        currentRoom = id;
        sync();
    }

    function copyInvite() {
        const inviteLink = `${window.location.origin}${window.location.pathname}?join=${currentRoom}`;
        navigator.clipboard.writeText(inviteLink);
        alert("Invite link for this specific server copied!");
    }

    async function boost() {
        if (!isSam) return alert("Nitro only!");
        await fetch('/api/chat', { method: 'POST', body: JSON.stringify({ action: "BOOST", serverId: currentRoom, nitro: true }) });
        sync();
    }

    function render(msgs) {
        // Servers
        const sBar = document.getElementById('s-bar');
        sBar.innerHTML = servers.map(s => `
            <div class="server-btn ${s.id === currentRoom ? 'active' : ''} ${s.boosted ? 'boosted' : ''}" 
                 onclick="currentRoom='${s.id}'; sync();" 
                 style="${s.icon ? `background-image:url(${s.icon})` : ''}">
                ${s.icon ? '' : s.name[0].toUpperCase()}
            </div>
        `).join('') + (isSam ? `<div class="server-btn" onclick="createSrv()" style="color:#23a55a; font-size:24px;">+</div>` : '');

        // Channel list (Simulated for this server)
        document.getElementById('c-list').innerHTML = `<div class="link active"># lounge</div>`;
        const activeSrv = servers.find(s => s.id === currentRoom);
        document.getElementById('s-name').innerText = activeSrv ? activeSrv.name : "Dcord";

        // Messages
        const filtered = msgs.filter(m => m.room === currentRoom);
        document.getElementById('flow').innerHTML = filtered.map(m => `
            <div class="msg">
                <div class="avatar ${m.nitro ? 'nitro-glow' : ''}">${m.user[0]}</div>
                <div>
                    <span style="font-weight:bold; ${m.nitro ? 'color:var(--nitro-pink)' : ''}">${m.user}</span>
                    <div style="color:var(--text-main);">${m.text}</div>
                </div>
            </div>
        `).join('');
    }

    async function handle(e) {
        if (e.key === 'Enter' && e.target.value.trim()) {
            await fetch('/api/chat', {
                method: 'POST',
                body: JSON.stringify({ user: myName, text: e.target.value, room: currentRoom, nitro: isSam })
            });
            e.target.value = "";
            sync();
        }
    }

    document.getElementById('u-name').innerText = myName;
    setInterval(sync, 3000);
    sync();
</script>
</body>
</html>
